<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var d = document.documentElement;
          if (t === "light") d.classList.remove("dark");
          else d.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <!-- Replaced at `vite build` so you can confirm deploy freshness (view source or DevTools → Elements). -->
    <meta name="rexalgo-build" content="__REXALGO_BUILD__" />
    <!-- Avoid stale SPA shell after deploys (hashed JS/CSS filenames change every build). -->
    <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/rexalgo-mark.png" type="image/png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/rexalgo-mark.png" />
    <title>RexAlgo — Algorithmic &amp; Copy Trading on Mudrex Futures</title>
    <meta
      name="description"
      content="Run algorithmic strategies and copy-trade top traders on Mudrex Futures. No code needed. Browse 850+ strategies, backtest in minutes."
    />
    <meta name="author" content="RexAlgo" />
    <meta name="theme-color" content="#0f0f0f" />
    <link rel="canonical" href="https://rexalgo.xyz" />
    <link rel="preconnect" href="https://rexalgo-production.up.railway.app" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RexAlgo" />
    <meta property="og:title" content="RexAlgo — Algorithmic &amp; Copy Trading on Mudrex Futures" />
    <meta
      property="og:description"
      content="Run algorithmic strategies and copy-trade top traders on Mudrex Futures. No code needed. Browse 850+ strategies, backtest in minutes."
    />
    <meta property="og:url" content="https://rexalgo.xyz" />
    <meta property="og:image" content="https://rexalgo.xyz/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RexAlgo — Algorithmic &amp; Copy Trading on Mudrex Futures" />
    <meta
      name="twitter:description"
      content="Run algorithmic strategies and copy-trade top traders on Mudrex Futures. No code needed. Browse 850+ strategies, backtest in minutes."
    />
    <meta name="twitter:image" content="https://rexalgo.xyz/og-default.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
