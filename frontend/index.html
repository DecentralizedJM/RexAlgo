<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          var d = document.documentElement;
          if (t === "light") d.classList.remove("dark");
          else d.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <!-- Replaced at `vite build` so you can confirm deploy freshness (view source or DevTools → Elements). -->
    <meta name="rexalgo-build" content="__REXALGO_BUILD__" />
    <!-- Avoid stale SPA shell after deploys (hashed JS/CSS filenames change every build). -->
    <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/rexalgo-mark.png" type="image/png" sizes="512x512" />
    <link rel="icon" href="/rexalgo-mark.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/rexalgo-mark.png" />
    <title>RexAlgo</title>
    <meta
      name="description"
      content="RexAlgo — algorithmic strategies and copy trading with Mudrex Futures."
    />
    <meta name="author" content="RexAlgo" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="RexAlgo" />
    <meta
      property="og:description"
      content="RexAlgo — algorithmic strategies and copy trading with Mudrex Futures."
    />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="RexAlgo" />
    <meta
      name="twitter:description"
      content="RexAlgo — algorithmic strategies and copy trading with Mudrex Futures."
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
