# RexAlgo — full stack (see README.md)
#   cp .env.example .env
#   docker compose up --build -d

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-openssl-rand}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-char-hex-or-string!!}
      REXALGO_DB_PATH: /data/rexalgo.db
      NODE_ENV: production
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      REXALGO_SESSION_MAX_AGE_DAYS: ${REXALGO_SESSION_MAX_AGE_DAYS:-}
    volumes:
      - rexalgo_data:/data
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rexalgo_data:
