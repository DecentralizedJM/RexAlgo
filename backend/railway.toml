# Optional: only used if the Railway service **Root Directory** is set to `backend`
# (then the repo-root railway.toml is ignored). Otherwise use root `railway.toml` + `Dockerfile.api`.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
