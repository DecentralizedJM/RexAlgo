# Railway: deploy this service with Root Directory = backend (monorepo on main).
# Pins Docker build so Nixpacks does not run the wrong app from repo root.
# @see docs/VERCEL-RAILWAY.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
