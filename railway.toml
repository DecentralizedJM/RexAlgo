# Railway: connect the GitHub repo at the monorepo root (no Root Directory override required).
# Uses Dockerfile.api so the API image builds from backend/ sources without Railpack guessing a start command.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.api"

[deploy]
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
